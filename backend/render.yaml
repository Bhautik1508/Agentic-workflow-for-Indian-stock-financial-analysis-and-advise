services:
  - type: web
    name: stocksage-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false       # Set in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: MARKETAUX_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false       # Set to your Vercel URL after deploy
    healthCheckPath: /api/health
